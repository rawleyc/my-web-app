name: CI Factory (Build, Store, and Auto-Promote)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # --- THE HERO STEP: AUTO-PROMOTE ---
      - name: Update Infra Repo
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_TOKEN }}
          NEW_SHA: ${{ steps.meta.outputs.version }} # This is the sha-xxxx tag
        run: |
          # 1. Clone the Infra Repo
          git clone https://x-access-token:${{ secrets.INFRA_TOKEN }}@github.com/${{ github.repository_owner }}/hero-infra.git
          cd hero-infra

          # 2. Use 'sed' to find the old image tag and replace it with the new one
          # Logic: Search for 'image: ghcr.io/rawleyc/my-web-app:sha-' and replace everything after the colon
          sed -i "s|image: ghcr.io/${{ github.repository }}:sha-.*|image: ghcr.io/${{ github.repository }}:${{ env.NEW_SHA }}|g" manifests/deployment.yaml

          # 3. Commit and Push back to the Infra Repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-update image to ${{ env.NEW_SHA }}"
          git push origin main