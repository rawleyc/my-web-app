name: CI Factory (Build and Store)

# 1. Trigger: When do we wake up?
on:
  push:
    branches: [ "main" ] # Only run when we update the main code
  pull_request:
    branches: [ "main" ]

# 2. Permissions: What can the robot do?
permissions:
  contents: read
  packages: write # Necessary to save the Docker image

jobs:
  build-and-push:
    runs-on: ubuntu-latest # The robot's OS
    
    steps:
      # Step A: Get the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step B: Login to the Warehouse (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step C: Give the image a name and a tag (Version)
      # We use the Git SHA (a unique code) so every build has a unique ID.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long

      # Step D: Build and Push!
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
